<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- 深色背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141428;stop-opacity:1" />
    </linearGradient>
    <!-- 主渐变 - 参考login页面的 #6a11cb 到 #2575fc -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a11cb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575fc;stop-opacity:1" />
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>
  
  <!-- 主图标 - 旋转的正方形设计，参考login logo -->
  <g transform="translate(32, 32) rotate(45)">
    <!-- 外框 - 带渐变和发光 -->
    <rect x="-18" y="-18" width="36" height="36" rx="6" fill="url(#mainGrad)" filter="url(#glow)" opacity="0.9"/>
    <!-- 内框 - 白色 -->
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="#fff" opacity="0.95"/>
    <!-- 中心装饰 - AI对话符号 -->
    <g transform="rotate(-45)">
      <!-- 简化的对话气泡 -->
      <circle cx="-6" cy="-2" r="3" fill="url(#mainGrad)" opacity="0.8"/>
      <circle cx="6" cy="2" r="3" fill="url(#mainGrad)" opacity="0.8"/>
      <!-- 连接线 -->
      <path d="M -3 -2 L 3 2" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>
  
  <!-- 背景装饰点 - 参考login的radial-gradient点 -->
  <circle cx="12" cy="12" r="1" fill="rgba(255,255,255,0.03)"/>
  <circle cx="52" cy="20" r="1" fill="rgba(255,255,255,0.03)"/>
  <circle cx="20" cy="52" r="1" fill="rgba(255,255,255,0.03)"/>
  <circle cx="48" cy="48" r="1" fill="rgba(255,255,255,0.03)"/>
</svg>

