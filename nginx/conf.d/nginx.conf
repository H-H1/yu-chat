events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    keepalive_timeout  65;

    # 限流配置 - 基于真实IP（考虑代理情况）
    # 获取真实IP（如果前面有反向代理）
    set_real_ip_from 0.0.0.0/0;  # 信任所有代理（生产环境建议指定具体IP段）
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    # 1. 静态资源限流（宽松，允许高并发）
    limit_req_zone $binary_remote_addr zone=staticLimit:10m rate=50r/s;
    
    # 2. API接口限流（严格，防止恶意攻击）
    limit_req_zone $binary_remote_addr zone=apiLimit:10m rate=5r/s;
    
    # 3. 登录/注册等敏感接口限流（非常严格）
    limit_req_zone $binary_remote_addr zone=authLimit:10m rate=1r/s;
    
    # 4. 全局限流（防止DDoS）
    limit_req_zone $binary_remote_addr zone=globalLimit:20m rate=20r/s;
    
    # 5. 并发连接数限流
    limit_conn_zone $binary_remote_addr zone=connLimit:10m;

    # 白名单（geo 必须在 http 块）
    geo $limit_whitelist {
        default 0;
        192.168.1.0/24 1;
        10.0.0.0/8 1;
    }

    server {
        listen       80;
        server_name localhost;

        root /usr/share/nginx/html/build/h5;
        index index.html;
        
        # 全局限流（保护服务器不被单个IP打垮）
        limit_req zone=globalLimit burst=30 nodelay;
        limit_req_status 429;
        limit_conn connLimit 20;  # 单个IP最大并发20个连接
        
        # ========== 静态资源（宽松限流） ==========
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            limit_req zone=staticLimit burst=100 nodelay;
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        
        # ========== 前端页面（正常限流） ==========
        location / {
            # 这里继承全局的20r/s限流
            try_files $uri $uri/ /index.html;
        }
        
        # ========== iLink 代理（解决生产环境 CORS） ==========
        location /ilink-proxy/ {
            proxy_pass https://ilinkai.weixin.qq.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host ilinkai.weixin.qq.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Origin "";
            proxy_set_header Referer "";

            # 注入 CORS 头，让浏览器放行
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, AuthorizationType, X-WECHAT-UIN" always;

            # 预检请求直接返回
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, AuthorizationType, X-WECHAT-UIN" always;
                return 204;
            }

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ========== 通用API（严格限流） ==========
        location /api/ {
            limit_req zone=apiLimit burst=10 nodelay;
            limit_req_status 429;

            # 白名单跳过限流
            if ($limit_whitelist) {
                set $limit_req_zone "";
            }

            proxy_pass http://yuchat-backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # ========== 敏感接口（超严格限流） ==========
        location ~ ^/api/(login|register|reset-password|send-code) {
            limit_req zone=authLimit burst=3 nodelay;
            limit_req_status 429;
            
            proxy_pass http://yuchat-backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # ========== WebSocket（不适用频率限流，只限制连接数） ==========
        location /ws {
            # WebSocket 不使用频率限流，只限制并发连接数
            limit_conn connLimit 2;  # 单个IP最多2个WebSocket连接
            
            proxy_pass http://yuchat-backend:5001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket特殊超时
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
    }
}